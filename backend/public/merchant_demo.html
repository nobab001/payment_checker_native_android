<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paychek Merchant Portal — মার্চেন্ট ডেমো</title>
    <!-- Premium Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --royal-indigo: #1A237E;
            --accent-blue: #2563eb;
            --card-bg: rgba(15, 23, 42, 0.75);
            --border-color: rgba(255, 255, 255, 0.1);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --input-bg: rgba(255, 255, 255, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Hind Siliguri', 'Outfit', sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, #09090b);
            min-height: 100vh;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .portal-container {
            width: 100%;
            max-width: 480px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            padding: 32px;
            transition: transform 0.3s;
        }

        .portal-header {
            text-align: center;
            margin-bottom: 28px;
        }

        .portal-logo {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 24px;
            font-weight: 800;
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.3);
        }

        .portal-header h1 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 6px;
            background: linear-gradient(135deg, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .portal-header p {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input {
            width: 100%;
            height: 48px;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 0 16px;
            color: white;
            font-size: 15px;
            font-weight: 500;
            outline: none;
            transition: all 0.3s;
        }

        .form-group input:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
            background: rgba(255, 255, 255, 0.08);
        }

        .btn-pay {
            width: 100%;
            height: 48px;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 14px rgba(37, 99, 235, 0.3);
        }

        .btn-pay:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.45);
        }

        .btn-pay:active {
            transform: translateY(0);
        }

        .test-tip {
            margin-top: 24px;
            padding: 12px;
            background: rgba(59, 130, 246, 0.08);
            border: 1px solid rgba(59, 130, 246, 0.15);
            border-radius: 12px;
            font-size: 12px;
            line-height: 1.5;
            color: #93c5fd;
            display: flex;
            gap: 8px;
        }
    </style>
</head>
<body>

    <div class="portal-container">
        <div class="portal-header">
            <div class="portal-logo">P</div>
            <h1 id="merchant-portal-title">Paychek Test Merchant</h1>
            <p>আপনার চেকআউট গেটওয়ে টেস্ট করতে অ্যামাউন্ট সেট করুন</p>
        </div>

        <div class="form-group">
            <label for="merchant-api-key">Merchant API Key</label>
            <input type="text" id="merchant-api-key" placeholder="যেমন: test_merchant_key" value="test_merchant_key">
        </div>

        <div class="form-group">
            <label for="payment-amount">পরিশোধযোগ্য অ্যামাউন্ট (BDT)</label>
            <input type="number" id="payment-amount" placeholder="যেমন: 500" value="500">
        </div>

        <button class="btn-pay" id="pay-now-btn" onclick="initiatePayment()">Pay Now / ব্যালেন্স রিচার্জ করুন</button>

        <div class="test-tip">
            <span>ℹ️</span>
            <span>এই টেস্ট পোর্টালে আপনার সেট করা API Key ও অ্যামাউন্ট চেকআউট গেটওয়েতে পাঠানো হবে এবং পেমেন্ট শেষে রিডাইরেক্ট করে এখানে ফেরত পাঠানো হবে।</span>
        </div>
    </div>

    <script>
        function initiatePayment() {
            const apiKey = document.getElementById('merchant-api-key').value.trim();
            const amount = document.getElementById('payment-amount').value.trim();

            if (!apiKey) {
                alert('অনুগ্রহ করে API Key প্রবেশ করান।');
                return;
            }

            if (!amount || parseFloat(amount) <= 0) {
                alert('অনুগ্রহ করে সঠিক পেমেন্ট অ্যামাউন্ট বসান।');
                return;
            }

            // Redirect to checkout_gateway.html with query parameters
            window.location.href = `/checkout_gateway.html?apiKey=${apiKey}&amount=${amount}`;
        }
    </script>
</body>
</html>
