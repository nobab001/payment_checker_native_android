<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Paychek — Checkout</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --purple: #5B21B6;
            --purple-dark: #4C1D95;
            --purple-light: #EDE9FE;
            --bkash: #E2136E;
            --nagad: #EF4123;
            --rocket: #8C3494;
            --upay: #00B99B;
            --text: #1e293b;
            --muted: #64748b;
            --border: #e2e8f0;
            --bg: #f8fafc;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Hind Siliguri', 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        .page { max-width: 420px; margin: 0 auto; min-height: 100vh; background: #fff; box-shadow: 0 0 40px rgba(0,0,0,.06); }

        /* ── Header ── */
        .top-bar {
            background: linear-gradient(135deg, var(--purple-dark), var(--purple));
            color: #fff; padding: 14px 16px 12px;
        }
        .top-row { display: flex; align-items: center; justify-content: space-between; }
        .merchant-title { font-size: 15px; font-weight: 700; flex: 1; text-align: center; }
        .merchant-logo { max-height: 28px; margin-right: 8px; border-radius: 6px; }
        .bell { opacity: .85; font-size: 18px; }
        .amount-strip {
            margin-top: 10px; background: rgba(255,255,255,.15); border-radius: 12px;
            padding: 10px 14px; text-align: center;
        }
        .amount-strip span { font-size: 11px; opacity: .9; }
        .amount-strip .amt { font-size: 26px; font-weight: 800; }

        /* ── Tab bar ── */
        .tab-bar {
            display: flex; gap: 6px; padding: 10px 12px; overflow-x: auto;
            border-bottom: 1px solid var(--border); background: #fff;
            -webkit-overflow-scrolling: touch;
        }
        .tab-bar::-webkit-scrollbar { display: none; }
        .tab-btn {
            flex: 0 0 auto; display: flex; flex-direction: column; align-items: center;
            gap: 4px; padding: 8px 12px; border-radius: 12px; border: none; background: transparent;
            cursor: pointer; min-width: 64px; transition: .2s;
        }
        .tab-btn .ico { font-size: 20px; }
        .tab-btn .lbl { font-size: 10px; font-weight: 700; color: var(--muted); white-space: nowrap; }
        .tab-btn.active { background: var(--purple-light); }
        .tab-btn.active .lbl { color: var(--purple); }

        .content { padding: 14px; }
        .hidden { display: none !important; }

        /* ── Design 1: List ── */
        .group-title {
            font-size: 13px; font-weight: 700; color: var(--purple);
            margin: 12px 0 8px; padding-left: 4px;
        }
        .list-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 14px; background: #fff; border: 1px solid var(--border);
            border-radius: 12px; margin-bottom: 8px;
        }
        .list-row .num { font-weight: 700; font-size: 15px; letter-spacing: .5px; }
        .btn-copy {
            background: var(--purple); color: #fff; border: none; border-radius: 8px;
            padding: 8px 14px; font-size: 12px; font-weight: 700; cursor: pointer;
        }
        .btn-copy.copied { background: #10B981; }

        /* ── Design 2: Cards ── */
        .card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .prov-card {
            border: 1px solid var(--border); border-radius: 16px; padding: 18px 12px;
            text-align: center; cursor: pointer; transition: .2s; background: #fff;
        }
        .prov-card:active { transform: scale(.98); }
        .prov-card .logo {
            width: 48px; height: 48px; border-radius: 14px; margin: 0 auto 10px;
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-weight: 800; font-size: 18px;
        }
        .prov-card .name { font-size: 13px; font-weight: 700; }
        .prov-card .sub { font-size: 10px; color: var(--muted); margin-top: 2px; }

        /* ── Design 3: Accordion ── */
        .accordion { border: 1px solid var(--border); border-radius: 14px; margin-bottom: 10px; overflow: hidden; }
        .acc-head {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 16px; background: #fff; cursor: pointer; font-weight: 700; font-size: 14px;
        }
        .acc-head .chev { transition: .2s; color: var(--muted); }
        .acc-head.open .chev { transform: rotate(180deg); }
        .acc-body { display: none; padding: 0 12px 12px; background: #fafafa; }
        .acc-body.open { display: block; }
        .acc-item {
            display: flex; align-items: center; gap: 10px; padding: 10px 8px;
            border-bottom: 1px solid var(--border);
        }
        .acc-item:last-child { border-bottom: none; }
        .acc-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
        .acc-info { flex: 1; }
        .acc-info .pname { font-weight: 700; font-size: 13px; }
        .acc-info .pnum { font-size: 12px; color: var(--muted); }
        .acc-copy { background: none; border: 1px solid var(--border); border-radius: 6px; padding: 4px 8px; cursor: pointer; font-size: 11px; }

        /* ── Live payment cards ── */
        .live-card {
            display: flex; align-items: center; gap: 12px; padding: 14px;
            border: 1px solid var(--border); border-radius: 14px; margin-bottom: 8px;
            cursor: pointer; background: #fff; transition: .2s;
        }
        .live-card:hover { border-color: var(--purple); }
        .live-card .live-badge {
            font-size: 9px; background: var(--purple-light); color: var(--purple);
            padding: 2px 8px; border-radius: 20px; font-weight: 700;
        }

        /* ── Verify / Vibe ── */
        .verify-box {
            margin: 14px; padding: 16px; border: 1px solid var(--border);
            border-radius: 16px; background: #fff;
        }
        .verify-box label { display: block; font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 6px; }
        .verify-box input {
            width: 100%; height: 44px; border: 2px solid var(--border); border-radius: 10px;
            padding: 0 12px; font-size: 15px; font-weight: 600; outline: none;
        }
        .verify-box input:focus { border-color: var(--purple); }
        .btn-primary {
            width: 100%; height: 46px; margin-top: 10px; background: var(--purple);
            color: #fff; border: none; border-radius: 12px; font-size: 14px; font-weight: 700; cursor: pointer;
        }
        .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
        .status { display: none; margin-top: 10px; padding: 10px; border-radius: 10px; font-size: 13px; font-weight: 600; text-align: center; }
        .status.ok { display: block; background: #ecfdf5; color: #065f46; }
        .status.err { display: block; background: #fef2f2; color: #991b1b; }
        .status.load { display: block; background: #f1f5f9; color: #475569; }
        .sync-note {
            margin: 0 14px 20px; padding: 12px; background: var(--purple-light);
            border-radius: 12px; font-size: 11px; color: var(--purple-dark); line-height: 1.5;
        }
        .empty { text-align: center; padding: 30px 16px; color: var(--muted); font-size: 13px; }
        .vibe-waiting {
            display: flex; align-items: center; gap: 8px; margin-top: 10px; padding: 10px;
            background: #f1f5f9; border-radius: 10px; font-size: 12px; color: #475569;
        }
        .spinner {
            width: 16px; height: 16px; border: 2px solid #cbd5e1; border-top-color: var(--purple);
            border-radius: 50%; animation: spin .7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="page">
    <div class="top-bar">
        <div class="top-row">
            <span style="width:24px"></span>
            <div style="display:flex;align-items:center;justify-content:center;flex:1">
                <img id="merchant-logo" class="merchant-logo hidden" alt="">
                <div class="merchant-title" id="merchant-name">Paychek</div>
            </div>
            <span class="bell">🔔</span>
        </div>
        <div class="amount-strip">
            <span>পরিশোধযোগ্য মোট পরিমাণ</span>
            <div class="amt">৳ <span id="payment-amount">0.00</span></div>
        </div>
    </div>

    <!-- Vibe pre-step -->
    <div id="vibe-step" class="verify-box hidden">
        <label>আপনি যে নাম্বার থেকে টাকা পাঠাবেন সেই নাম্বারটি লিখুন</label>
        <input type="tel" id="vibe-number" placeholder="01XXXXXXXXX" maxlength="11">
        <button class="btn-primary" id="vibe-start-btn" onclick="startVibe()">চেকআউটে যান</button>
        <div id="vibe-step-status" class="status"></div>
    </div>

    <div id="checkout-main" class="hidden">
        <div class="tab-bar" id="tab-bar"></div>
        <div class="content" id="pay-content"></div>

        <div class="verify-box">
            <label for="trx-input" id="trx-label">ট্রানজেকশন আইডি (TrxID) দিন</label>
            <input type="text" id="trx-input" placeholder="যেমন: 8A47K89J2B" autocomplete="off">
            <button class="btn-primary" id="verify-btn" onclick="triggerVerification()">ভেরিফাই পেমেন্ট</button>
            <div id="vibe-waiting" class="vibe-waiting hidden">
                <div class="spinner"></div>
                <span>পেমেন্টের জন্য অপেক্ষা... টাকা এলে স্বয়ংক্রিয়ভাবে নিশ্চিত হবে।</span>
            </div>
            <div id="status-panel" class="status"></div>
        </div>

        <div class="sync-note">
            📡 নাম্বারগুলো আপনার অ্যাক্টিভ ডিভাইসের SIM থেকে অটো-সিঙ্ক হয়। ম্যানুয়ালি যোগ/এডিট করা যায় না। নিষ্ক্রিয় SIM স্বয়ংক্রিয়ভাবে সরে যায়।
        </div>
    </div>
</div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const apiKey = urlParams.get('apiKey');
const amount = urlParams.get('amount') || '0.00';
const sessionToken = urlParams.get('session') || null;

let checkoutMode = 'transaction';
let checkoutDesign = 'design-1';
let activeTab = 'send_money';
let vibeRequestId = null, vibePollTimer = null;
let successUrl = null, cancelUrl = null;
let gateways = [], officialGateways = [], tabs = [];

const TAB_META = {
    send_money: { icon: '💸', label: 'Send Money' },
    cash_out:   { icon: '💵', label: 'Cash Out' },
    payment:    { icon: '📱', label: 'Payment' },
    bank:       { icon: '🏦', label: 'Bank' },
    card:       { icon: '💳', label: 'Card' },
};
const COLORS = { bkash: '#E2136E', nagad: '#EF4123', rocket: '#8C3494', upay: '#00B99B' };

document.getElementById('payment-amount').textContent = parseFloat(amount).toFixed(2);

function provColor(p) { return COLORS[(p||'').toLowerCase()] || '#94a3b8'; }
function provInitial(p) { return (p||'?').charAt(0).toUpperCase(); }

async function fetchLayout() {
    if (!apiKey) { showStatus('API Key অনুপস্থিত!', 'err'); return; }
    try {
        const r = await fetch(`/api/checkout/${apiKey}`);
        if (!r.ok) throw new Error('load failed');
        const data = await r.json();

        checkoutMode = data.checkoutMode || 'transaction';
        checkoutDesign = data.checkoutDesign || data.checkoutTheme || 'design-1';
        successUrl = data.successUrl || data.redirectUrl;
        cancelUrl = data.cancelUrl;
        gateways = data.activeGateways || [];
        officialGateways = data.officialGateways || [];
        tabs = data.checkoutTabs || Object.values(data.checkoutTabsAll || {}).filter(t => t.enabled);

        document.getElementById('merchant-name').textContent = data.companyName || data.siteName || 'Paychek';
        if (data.logoUrl) {
            const lg = document.getElementById('merchant-logo');
            lg.src = data.logoUrl; lg.classList.remove('hidden');
        }

        if (checkoutMode === 'merchant_vibe') {
            document.getElementById('vibe-step').classList.remove('hidden');
        } else {
            document.getElementById('checkout-main').classList.remove('hidden');
            renderTabs();
            renderContent();
        }
    } catch (e) {
        console.error(e);
        document.getElementById('checkout-main').classList.remove('hidden');
        document.getElementById('pay-content').innerHTML = '<div class="empty">লোড ব্যর্থ। আবার চেষ্টা করুন।</div>';
    }
}

function renderTabs() {
    const bar = document.getElementById('tab-bar');
    bar.innerHTML = '';
    if (!tabs.length) tabs = [{ id: 'send_money', label: 'Send Money' }];
    if (!tabs.find(t => t.id === activeTab)) activeTab = tabs[0].id;

    tabs.forEach(t => {
        const meta = TAB_META[t.id] || { icon: '💳', label: t.label };
        const btn = document.createElement('button');
        btn.className = 'tab-btn' + (t.id === activeTab ? ' active' : '');
        btn.innerHTML = `<span class="ico">${meta.icon}</span><span class="lbl">${meta.label}</span>`;
        btn.onclick = () => { activeTab = t.id; renderTabs(); renderContent(); };
        bar.appendChild(btn);
    });
}

function itemsForTab(tabId) {
    const simItems = gateways.filter(g => g.tab === tabId || (tabId === 'send_money' && (!g.tab || g.tab === 'send_money')));
    const liveItems = officialGateways.filter(o => o.tab === tabId);
    return { simItems, liveItems };
}

function renderContent() {
    const el = document.getElementById('pay-content');
    const { simItems, liveItems } = itemsForTab(activeTab);

    if (checkoutDesign === 'design-2') el.innerHTML = renderDesign2(simItems, liveItems);
    else if (checkoutDesign === 'design-3') el.innerHTML = renderDesign3(simItems, liveItems);
    else el.innerHTML = renderDesign1(simItems, liveItems);

    bindLiveButtons();
    bindAccordions();
}

/* ── Design 1: List View ── */
function renderDesign1(simItems, liveItems) {
    let html = '';
    const groups = groupBy(simItems, g => g.groupLabel || g.provider);
    for (const [label, items] of Object.entries(groups)) {
        html += `<div class="group-title">${esc(label)}</div>`;
        items.forEach(g => {
            html += `<div class="list-row">
                <span class="num">${esc(g.number)}</span>
                <button class="btn-copy" onclick="copyNum('${esc(g.number)}',this)">কপি করুন</button>
            </div>`;
        });
    }
    liveItems.forEach(o => { html += liveCardHtml(o); });
    if (!html) html = '<div class="empty">এই ট্যাবে কোনো পেমেন্ট মেথড নেই।</div>';
    return html;
}

/* ── Design 2: Card View ── */
function renderDesign2(simItems, liveItems) {
    const seen = new Set();
    let html = '<div class="card-grid">';
    simItems.forEach(g => {
        const key = g.provider;
        if (seen.has(key)) return;
        seen.add(key);
        const c = provColor(g.provider);
        html += `<div class="prov-card" onclick="copyNum('${esc(g.number)}',null)">
            <div class="logo" style="background:${c}">${provInitial(g.provider)}</div>
            <div class="name">${esc(g.displayName || g.provider)}</div>
            <div class="sub">${esc(g.number)}</div>
        </div>`;
    });
    liveItems.forEach(o => {
        html += `<div class="prov-card" data-live="${esc(o.provider)}">
            <div class="logo" style="background:var(--purple)">⚡</div>
            <div class="name">${esc(o.displayName)}</div>
            <div class="sub"><span class="live-badge">Live Payment</span></div>
        </div>`;
    });
    html += '</div>';
    if (simItems.length === 0 && liveItems.length === 0) html = '<div class="empty">এই ট্যাবে কোনো পেমেন্ট মেথড নেই।</div>';
    return html;
}

/* ── Design 3: Accordion ── */
function renderDesign3(simItems, liveItems) {
    const groups = groupBy(simItems, g => g.groupLabel || g.provider);
    let html = '';
    let idx = 0;
    for (const [label, items] of Object.entries(groups)) {
        const open = idx === 0 ? 'open' : '';
        html += `<div class="accordion">
            <div class="acc-head ${open}" onclick="toggleAcc(this)">
                <span>${esc(label)}</span><span class="chev">▼</span>
            </div>
            <div class="acc-body ${open}">`;
        items.forEach(g => {
            html += `<div class="acc-item">
                <span class="acc-dot" style="background:${provColor(g.provider)}"></span>
                <div class="acc-info"><div class="pname">${esc(g.displayName||g.provider)}</div><div class="pnum">${esc(g.number)}</div></div>
                <button class="acc-copy" onclick="copyNum('${esc(g.number)}',this)">কপি</button>
            </div>`;
        });
        html += '</div></div>';
        idx++;
    }
    liveItems.forEach(o => { html += liveCardHtml(o); });
    if (!html) html = '<div class="empty">এই ট্যাবে কোনো পেমেন্ট মেথড নেই।</div>';
    return html;
}

function liveCardHtml(o) {
    return `<div class="live-card" data-live="${esc(o.provider)}">
        <div style="flex:1">
            <div style="font-weight:700">${esc(o.displayName)}</div>
            <span class="live-badge">লাইভ পেমেন্ট — অফিসিয়াল গেটওয়ে</span>
        </div><span>→</span>
    </div>`;
}

function bindLiveButtons() {
    document.querySelectorAll('[data-live]').forEach(el => {
        el.onclick = () => startLivePay(el.dataset.live);
    });
}
function bindAccordions() { /* toggled inline */ }
function toggleAcc(head) {
    head.classList.toggle('open');
    head.nextElementSibling.classList.toggle('open');
}

function groupBy(arr, fn) {
    return arr.reduce((acc, item) => {
        const k = fn(item);
        (acc[k] = acc[k] || []).push(item);
        return acc;
    }, {});
}
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/'/g,'&#39;'); }

function copyNum(num, btn) {
    navigator.clipboard.writeText(num).then(() => {
        if (btn) { const o = btn.textContent; btn.textContent = '✓'; btn.classList.add('copied'); setTimeout(() => { btn.textContent = o; btn.classList.remove('copied'); }, 1500); }
    }).catch(() => {});
}

async function startLivePay(provider) {
    try {
        const r = await fetch(`/api/checkout/${apiKey}/live-init`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ provider, amount: parseFloat(amount) })
        });
        const res = await r.json();
        if (res.success && res.redirectUrl) window.location.href = res.redirectUrl;
        else showStatus(res.error || 'লাইভ পেমেন্ট শুরু করা যায়নি।', 'err');
    } catch (e) { showStatus('সংযোগ ত্রুটি।', 'err'); }
}

/* ── Vibe Mode ── */
async function startVibe() {
    const norm = document.getElementById('vibe-number').value.replace(/\D/g,'').replace(/^880/,'').slice(-11);
    if (norm.length !== 11) { showVibeStatus('সঠিক ১১-সংখ্যার নাম্বার দিন।','err'); return; }
    document.getElementById('vibe-start-btn').disabled = true;
    try {
        const r = await fetch(`/api/checkout/${apiKey}/vibe-init`, {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ customerNumber: norm, amount: parseFloat(amount) })
        });
        const res = await r.json();
        if (!res.success) { showVibeStatus(res.error||'ব্যর্থ','err'); document.getElementById('vibe-start-btn').disabled=false; return; }
        vibeRequestId = res.requestId;
        document.getElementById('vibe-step').classList.add('hidden');
        document.getElementById('checkout-main').classList.remove('hidden');
        document.getElementById('vibe-waiting').classList.remove('hidden');
        document.getElementById('trx-label').textContent = 'ম্যাচ না হলে TrxID দিয়ে ভেরিফাই করুন';
        renderTabs(); renderContent(); startVibePolling();
    } catch(e) { showVibeStatus('সার্ভার ত্রুটি।','err'); document.getElementById('vibe-start-btn').disabled=false; }
}
function startVibePolling() {
    if (vibePollTimer) clearInterval(vibePollTimer);
    vibePollTimer = setInterval(async () => {
        if (!vibeRequestId) return;
        try {
            const r = await fetch(`/api/checkout/vibe-status/${vibeRequestId}`);
            const res = await r.json();
            if (res.status === 'matched') { stopVibe(); showStatus('পেমেন্ট স্বয়ংক্রিয়ভাবে নিশ্চিত! ✓','ok'); redirectSuccess(res.trxId); }
            else if (res.status === 'expired') { stopVibe(); showStatus('সময় শেষ। TrxID দিয়ে ভেরিফাই করুন।','err'); }
        } catch(_) {}
    }, 4000);
}
function stopVibe() { if(vibePollTimer){clearInterval(vibePollTimer);vibePollTimer=null;} document.getElementById('vibe-waiting').classList.add('hidden'); }

async function triggerVerification() {
    const trx = document.getElementById('trx-input').value.trim();
    if (!trx) { showStatus('TrxID লিখুন।','err'); return; }
    const btn = document.getElementById('verify-btn');
    btn.disabled = true; showStatus('যাচাই করা হচ্ছে...','load');
    try {
        const r = await fetch('/api/checkout/verify', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ apiKey, trxId: trx, amount: parseFloat(amount), session: sessionToken })
        });
        const res = await r.json();
        if (res.success) { stopVibe(); showStatus(res.message,'ok'); if(res.redirectUrl) setTimeout(()=>location.href=res.redirectUrl,2000); }
        else { showStatus(res.message||'ভেরিফিকেশন ব্যর্থ।','err'); btn.disabled=false; }
    } catch(e) { showStatus('সার্ভার ত্রুটি।','err'); btn.disabled=false; }
}

function redirectSuccess(trxId) {
    if (!successUrl) return;
    const sep = successUrl.includes('?') ? '&' : '?';
    setTimeout(() => { location.href = `${successUrl}${sep}trxId=${encodeURIComponent(trxId||'')}&amount=${encodeURIComponent(amount)}&status=success`; }, 2000);
}
function showStatus(t, cls) { const p=document.getElementById('status-panel'); p.className='status '+cls; p.textContent=t; }
function showVibeStatus(t, cls) { const p=document.getElementById('vibe-step-status'); p.className='status '+cls; p.textContent=t; }

window.onload = fetchLayout;
</script>
</body>
</html>
